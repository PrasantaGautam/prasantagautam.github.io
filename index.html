<!DOCTYPE html>
<html>
<head>
  <title>Camera Capture Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background: #0f172a; color: white; text-align: center; }
    h1 { margin-top: 20px; font-size: 28px; }
    .container { max-width: 400px; margin: auto; padding: 20px; }
    .card { background: #1e293b; padding: 15px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-top: 20px; }
    video, img { width: 100%; border-radius: 12px; background: black; }
    button { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; transition: 0.2s; }
    .start { background: #22c55e; }
    .capture { background: #3b82f6; }
    button:hover { opacity: 0.85; }
    #status { margin-top: 10px; font-size: 14px; color: #cbd5f5; }
    .preview-title { margin-top: 10px; font-size: 14px; color: #94a3b8; }
  </style>
</head>
<body>

<h1>📷 Camera Capture</h1>

<div class="container">

  <div class="card">
    <video id="video" autoplay></video>
    <button class="start" onclick="startCamera()">Start Camera</button>
    <button class="capture" onclick="capture()">Capture & Send</button>
    <p id="status">Status: Idle</p>
  </div>

  <div class="card">
    <p class="preview-title">Captured Image Preview</p>
    <img id="preview" />
  </div>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let video = document.getElementById("video");
let preview = document.getElementById("preview");
let statusText = document.getElementById("status");

// Start webcam
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    statusText.innerText = "Camera started ✅";
  } catch (err) {
    statusText.innerText = "Camera permission denied ❌";
    console.error(err);
  }
}

// Capture and upload
function capture() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  // Show preview
  canvas.toBlob(blob => {
    preview.src = URL.createObjectURL(blob);
    statusText.innerText = "Sending image... ⏳";

    // Prepare multipart/form-data
    const formData = new FormData();
    formData.append("file", blob, "capture.png");

    // Replace with your Cloudflare Tunnel URL
    fetch("https://diesel-critical-discharge-insulin.trycloudflare.com/upload", {
      method: "POST",
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      if(data.status === "success") {
        statusText.innerText = "Image sent ✅";
      } else {
        statusText.innerText = "Upload failed ❌";
        console.error("Server response:", data);
      }
    })
    .catch(err => {
      statusText.innerText = "Error sending image ❌";
      console.error("Fetch error:", err);
    });

  }, "image/png");
}
</script>

</body>
</html>
